name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Extract Release Notes
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^###? \[?${VERSION}\]?/{flag=1; next} /^###? \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            # Fallback: use git log since last tag
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log --oneline --no-merges ${PREV_TAG}..HEAD)
            else
              NOTES=$(git log --oneline --no-merges)
            fi
          fi
          # Save to file to avoid escaping issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/esm/index.min.mjs
            dist/cjs/index.min.js
            dist/umd/index.min.global.js
            dist/umd.bundle/index.axios.min.global.js

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
