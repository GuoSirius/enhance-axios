<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>enhance-axios 功能测试</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { color: #e94560; margin-bottom: 5px; }
.subtitle { color: #888; margin-bottom: 20px; }
.stats { margin-bottom: 20px; }
.stats span { margin-right: 15px; }
.stat-num { color: #e94560; font-weight: bold; }
.container { display: flex; gap: 20px; }
.panel { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 16px; }
.left { width: 300px; }
.right { flex: 1; }
.section { margin-bottom: 16px; }
.section-title { font-size: 14px; font-weight: bold; color: #e94560; margin-bottom: 8px; }
.label { font-size: 12px; color: #aaa; margin: 6px 0 3px; }
.form-row { margin: 8px 0; }
input { background: #0f3460; border: 1px solid #1a4080; color: #e0e0e0; padding: 8px; border-radius: 4px; width: 100%; font-size: 12px; }
input:focus { outline: none; border-color: #e94560; }
input[type=checkbox] { width: auto; }
button { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; margin: 4px; }
button:hover { opacity: 0.9; }
.btn-primary { background: #e94560; color: #fff; }
.btn-success { background: #27ae60; color: #fff; }
.btn-warning { background: #e67e22; color: #fff; }
.btn-danger { background: #c0392b; color: #fff; }
.log-area { background: #0a0a1a; border-radius: 6px; padding: 12px; height: 400px; overflow-y: auto; margin-top: 16px; font-size: 12px; }
.log-entry { margin-bottom: 4px; padding: 4px; border-radius: 3px; display: flex; gap: 10px; }
.log-entry:hover { background: #1a1a3e; }
.log-time { color: #666; }
.log-method { color: #3498db; min-width: 50px; }
.log-url { flex: 1; }
.log-status { min-width: 150px; text-align: right; }
.log-status.success { color: #27ae60; }
.log-status.error { color: #e74c3c; }
.log-status.cancel { color: #e67e22; }
.log-status.retry { color: #3498db; }
.log-status.duplicate { color: #9b59b6; }
.loading { color: #e67e22; }
.error { color: #e74c3c; }
</style>
</head>
<body>
<h1>enhance-axios 功能测试</h1>
<p class="subtitle">防重复提交 · 取消请求 · 失败重试</p>

<div class="stats">
  <span>请求: <span class="stat-num" id="stat-total">0</span></span>
  <span>成功: <span class="stat-num" id="stat-ok">0</span></span>
  <span>重试: <span class="stat-num" id="stat-retry">0</span></span>
  <span>取消: <span class="stat-num" id="stat-cancel">0</span></span>
</div>

<div class="container">
  <div class="panel left">
    <div class="section">
      <div class="section-title">实例配置</div>
      <div class="form-row">
        <label class="label">Base URL</label>
        <input type="text" id="baseUrl" value="http://localhost:3000/api">
      </div>
      <div class="form-row">
        <label class="label">Timeout (ms)</label>
        <input type="number" id="timeout" value="10000">
      </div>
    </div>

    <div class="section">
      <div class="section-title">防重复提交</div>
      <div class="form-row"><label><input type="checkbox" id="prevent-enabled" checked> Enabled</label></div>
      <div class="form-row">
        <label class="label">requestKey</label>
        <input type="text" id="prevent-key" value="${method}-${url}">
      </div>
      <div class="form-row">
        <label class="label">intervalMs</label>
        <input type="number" id="prevent-interval" value="2000">
      </div>
    </div>

    <div class="section">
      <div class="section-title">取消请求</div>
      <div class="form-row"><label><input type="checkbox" id="cancel-enabled" checked> Enabled</label></div>
      <div class="form-row">
        <label class="label">requestKey</label>
        <input type="text" id="cancel-key" value="${method}-${url}">
      </div>
    </div>

    <div class="section">
      <div class="section-title">失败重试</div>
      <div class="form-row"><label><input type="checkbox" id="retry-enabled" checked> Enabled</label></div>
      <div class="form-row">
        <label class="label">retries</label>
        <input type="number" id="retry-count" value="3">
      </div>
      <div class="form-row">
        <label class="label">retryDelay (ms)</label>
        <input type="number" id="retry-delay" value="1000">
      </div>
    </div>

    <button class="btn-primary" onclick="rebuildInstance()">重新创建实例</button>
  </div>

  <div class="panel right">
    <div class="section-title">测试操作</div>
    <button class="btn-primary" onclick="testPreventDuplicate()">防重复 (连发5次)</button>
    <button class="btn-warning" onclick="testCancelRequest()">取消请求 (连发5次)</button>
    <button class="btn-success" onclick="testRetry()">重试 (50%失败)</button>
    <button class="btn-danger" onclick="testServer500()">500错误</button>
    <button class="btn-primary" onclick="testSingle()">单次请求</button>
    <button class="btn-danger" onclick="clearLog()">清空日志</button>

    <div class="log-area" id="logArea">
      <div class="loading">正在加载 enhance-axios...</div>
    </div>
  </div>
</div>

<!-- 先加载 axios -->
<script src="../node_modules/axios/dist/axios.min.js"></script>
<!-- 再加载 enhance-axios -->
<script src="../dist/iife/index.global.js"></script>

<script>
// 全局状态
var apiInstance = null;
var stats = { total: 0, ok: 0, retry: 0, cancel: 0 };

// 初始化
function init() {
  addLog('info', '', 'window.axios 加载: ' + (typeof window.axios !== 'undefined'), 'info');
  addLog('info', '', 'EnhanceAxios 加载: ' + (typeof window.EnhanceAxios !== 'undefined'), 'info');

  if (typeof window.EnhanceAxios === 'undefined') {
    addLog('error', '', 'EnhanceAxios 未定义!', 'error');
    return;
  }
  addLog('success', '', '✅ enhance-axios 已加载 v' + (window.EnhanceAxios.version || ''), 'success');
  rebuildInstance();
}

function rebuildInstance() {
  var config = {
    baseURL: document.getElementById('baseUrl').value,
    timeout: parseInt(document.getElementById('timeout').value) || 10000,
    preventDuplicate: document.getElementById('prevent-enabled').checked ? {
      requestKey: document.getElementById('prevent-key').value,
      intervalMs: parseInt(document.getElementById('prevent-interval').value) || 1000,
    } : false,
    cancelRequest: document.getElementById('cancel-enabled').checked ? {
      requestKey: document.getElementById('cancel-key').value,
    } : false,
    retry: document.getElementById('retry-enabled').checked ? {
      retries: parseInt(document.getElementById('retry-count').value) || 3,
      retryDelay: parseInt(document.getElementById('retry-delay').value) || 1000,
    } : false,
  };

  try {
    apiInstance = window.EnhanceAxios.createEnhanceInstance(config);
    addLog('success', '', '实例创建成功', 'success');
  } catch (e) {
    addLog('error', '', '创建失败: ' + e.message, 'error');
  }
}

function testPreventDuplicate() {
  if (!apiInstance) { addLog('error', '', '请先创建实例', 'error'); return; }
  addLog('info', 'POST', '/api/submit', '防重复测试: 连发5次');
  for (var i = 1; i <= 5; i++) {
    apiInstance.post('/submit', { name: 'test', seq: i }, {
      preventDuplicate: { requestKey: '${method}-${url}', intervalMs: 2000 },
      cancelRequest: false, retry: false,
    }).then(function(res) {
      stats.ok++; updateStats();
      addLog('success', 'POST', '/api/submit', '✅ 成功');
    }).catch(function(err) {
      if (err && err.message && err.message.includes('prevented')) {
        stats.cancel++; updateStats();
        addLog('duplicate', 'POST', '/api/submit', '⏸️ 被拦截');
      } else {
        addLog('error', 'POST', '/api/submit', '❌ ' + (err && err.message || '未知错误'));
      }
    });
  }
}

function testCancelRequest() {
  if (!apiInstance) { addLog('error', '', '请先创建实例', 'error'); return; }
  addLog('info', 'GET', '/api/search', '取消请求测试: 连发5次');
  for (var i = 1; i <= 5; i++) {
    apiInstance.get('/search', { q: 'keyword-' + i }, {
      cancelRequest: { requestKey: '${method}-${url}' },
      preventDuplicate: false, retry: false,
    }).then(function(res) {
      stats.ok++; updateStats();
      addLog('success', 'GET', '/api/search', '✅ 成功');
    }).catch(function(err) {
      if (err && err.message && err.message.includes('cancel')) {
        stats.cancel++; updateStats();
        addLog('cancel', 'GET', '/api/search', '🚫 被取消');
      } else {
        addLog('error', 'GET', '/api/search', '❌ ' + (err && err.message || '未知错误'));
      }
    });
  }
}

function testRetry() {
  if (!apiInstance) { addLog('error', '', '请先创建实例', 'error'); return; }
  addLog('info', 'GET', '/api/data', '重试测试: 50%失败');
  apiInstance.get('/data', null, {
    retry: { retries: 3, retryDelay: 500 },
    preventDuplicate: false, cancelRequest: false,
  }).then(function(res) {
    stats.ok++; updateStats();
    addLog('success', 'GET', '/api/data', '✅ 成功');
  }).catch(function(err) {
    addLog('error', 'GET', '/api/data', '❌ ' + (err && err.message || '未知错误'));
  });
}

function testServer500() {
  if (!apiInstance) { addLog('error', '', '请先创建实例', 'error'); return; }
  addLog('info', 'GET', '/api/error', '500错误测试 (重试3次)');
  apiInstance.get('/api/error', null, {
    retry: { retries: 3, retryDelay: 500 },
    preventDuplicate: false, cancelRequest: false,
  }).then(function() {
    stats.ok++; updateStats();
    addLog('success', 'GET', '/api/error', '✅ 成功');
  }).catch(function(err) {
    addLog('error', 'GET', '/api/error', '❌ 重试耗尽');
  });
}

function testSingle() {
  if (!apiInstance) { addLog('error', '', '请先创建实例', 'error'); return; }
  addLog('info', 'GET', '/api/success', '单次请求测试');
  apiInstance.get('/api/success', null, {
    preventDuplicate: false, cancelRequest: false, retry: false,
  }).then(function(res) {
    stats.ok++; updateStats();
    addLog('success', 'GET', '/api/success', '✅ ' + JSON.stringify(res.data));
  }).catch(function(err) {
    addLog('error', 'GET', '/api/success', '❌ ' + (err && err.message || '未知错误'));
  });
}

function addLog(method, url, message, status) {
  stats.total++;
  updateStats();
  var logArea = document.getElementById('logArea');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML =
    '<span class="log-time">' + new Date().toLocaleTimeString() + '</span>' +
    '<span class="log-method">' + method + '</span>' +
    '<span class="log-url">' + url + '</span>' +
    '<span class="log-status ' + status + '">' + message + '</span>';
  logArea.appendChild(entry);
  logArea.scrollTop = logArea.scrollHeight;
  if (logArea.children.length > 100) logArea.removeChild(logArea.firstChild);
}

function clearLog() {
  document.getElementById('logArea').innerHTML = '';
  stats = { total: 0, ok: 0, retry: 0, cancel: 0 };
  updateStats();
}

function updateStats() {
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-ok').textContent = stats.ok;
  document.getElementById('stat-retry').textContent = stats.retry;
  document.getElementById('stat-cancel').textContent = stats.cancel;
}

// 页面加载完成后初始化
window.addEventListener('load', init);
</script>
</body>
</html>
